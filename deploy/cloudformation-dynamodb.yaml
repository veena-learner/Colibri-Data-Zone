AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for Colibri Data Zone

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production

Resources:
  ColibriDataZoneTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'ColibriDataZone-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: ColibriDataZone
        - Key: Environment
          Value: !Ref Environment

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref ColibriDataZoneTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt ColibriDataZoneTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
